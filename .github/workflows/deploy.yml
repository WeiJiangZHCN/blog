name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 切换到代码分支
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 如果存在 pnpm-lock.yaml，则提前安装 pnpm
      - name: Install pnpm
        if: hashFiles('pnpm-lock.yaml') != ''
        uses: pnpm/action-setup@v3
        with:
          version: 8

      # 3. 初始化 Node 环境（使用独立的条件判断来做缓存，防止 YAML 语法报错）
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: ${{ hashFiles('pnpm-lock.yaml') != '' && 'pnpm' || hashFiles('package-lock.json') != '' && 'npm' || hashFiles('yarn.lock') != '' && 'yarn' || '' }}

      # 4. 智能安装依赖
      - name: Install dependencies
        run: |
          if [ -f pnpm-lock.yaml ]; then pnpm install;
          elif [ -f yarn.lock ]; then yarn install;
          else npm ci; fi

      # 5. 打包构建静态文件
      - name: Build Website
        run: |
          if [ -f pnpm-lock.yaml ]; then pnpm run build;
          elif [ -f yarn.lock ]; then yarn build;
          else npm run build; fi

      # 6. 将打包出来的静态资源部署到当前仓库的 gh-pages 分支
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist