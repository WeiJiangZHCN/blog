name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ] # 无论你的主分支叫 main 还是 master，都会触发
  workflow_dispatch: # 允许你在网页端手动点按钮触发

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 切换到代码分支
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 初始化 Node 环境
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: ${{ hashFiles('package-lock.json') ? 'npm' : hashFiles('pnpm-lock.yaml') ? 'pnpm' : 'yarn' }}

      # 3. 兼容 pnpm 环境（Astro 主题很常用，如果不用会自动跳过）
      - name: Install pnpm
        if: hashFiles('pnpm-lock.yaml') != ''
        uses: pnpm/action-setup@v3
        with:
          version: 8

      # 4. 智能安装依赖
      - name: Install dependencies
        run: |
          if [ -f pnpm-lock.yaml ]; then pnpm install;
          elif [ -f yarn.lock ]; then yarn install;
          else npm ci; fi

      # 5. 打包构建静态文件
      - name: Build Website
        run: |
          if [ -f pnpm-lock.yaml ]; then pnpm run build;
          elif [ -f yarn.lock ]; then yarn build;
          else npm run build; fi

      # 6. 将打包出来的静态资源部署到当前仓库的 gh-pages 分支
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist # Astro、VitePress 默认输出为 ./dist；如果是 Hexo 请改成 ./public